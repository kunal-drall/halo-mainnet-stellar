<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Gold gradient for the halo ring -->
    <linearGradient id="haloGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C468"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8912E"/>
    </linearGradient>
    <!-- Subtle glow behind the ring -->
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
    <!-- Inner shadow for depth -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
    <!-- Outer glow on ring -->
    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (optional, for icon usage on dark) -->
  <circle cx="256" cy="256" r="256" fill="#080B12"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="220" r="180" fill="url(#glow)"/>

  <!-- Outer halo ring — the main symbol -->
  <g filter="url(#ringGlow)">
    <!-- Main ring arc (270 degrees, open at bottom) -->
    <path d="M 152 280 A 120 120 0 1 1 360 280"
          stroke="url(#haloGold)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Second thinner concentric arc for depth -->
    <path d="M 172 278 A 98 98 0 1 1 340 278"
          stroke="#D4A843" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3"/>
  </g>

  <!-- Three small circles representing community/members -->
  <circle cx="196" cy="310" r="8" fill="#D4A843" opacity="0.7"/>
  <circle cx="256" cy="330" r="8" fill="#E8C468" opacity="0.9"/>
  <circle cx="316" cy="310" r="8" fill="#D4A843" opacity="0.7"/>

  <!-- Connecting lines between members (subtle) -->
  <line x1="204" y1="310" x2="248" y2="330" stroke="#D4A843" stroke-width="1.5" opacity="0.25"/>
  <line x1="264" y1="330" x2="308" y2="310" stroke="#D4A843" stroke-width="1.5" opacity="0.25"/>
  <line x1="196" y1="310" x2="316" y2="310" stroke="#D4A843" stroke-width="1" opacity="0.15"/>

  <!-- HALO wordmark -->
  <text x="256" y="420" text-anchor="middle" font-family="'Space Grotesk', 'SF Pro Display', system-ui, sans-serif" font-size="72" font-weight="700" letter-spacing="12" fill="#EDEDED">HALO</text>

  <!-- Tagline -->
  <text x="256" y="452" text-anchor="middle" font-family="'DM Sans', 'SF Pro Text', system-ui, sans-serif" font-size="16" font-weight="400" letter-spacing="4" fill="#787E88">CREDIT CIRCLES</text>
</svg>