<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C468"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8912E"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="256" height="256" rx="56" fill="#080B12"/>

  <!-- Ambient glow -->
  <circle cx="128" cy="108" r="90" fill="url(#bg-glow)"/>

  <!-- Main halo arc -->
  <g filter="url(#glow)">
    <path d="M 68 148 A 72 72 0 1 1 188 148"
          stroke="url(#gold)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Inner echo arc -->
    <path d="M 80 146 A 58 58 0 1 1 176 146"
          stroke="#D4A843" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.25"/>
  </g>

  <!-- Community dots -->
  <circle cx="98" cy="168" r="6" fill="#D4A843" opacity="0.7"/>
  <circle cx="128" cy="180" r="6" fill="#E8C468" opacity="0.9"/>
  <circle cx="158" cy="168" r="6" fill="#D4A843" opacity="0.7"/>

  <!-- Connecting lines -->
  <line x1="104" y1="168" x2="122" y2="180" stroke="#D4A843" stroke-width="1.2" opacity="0.2"/>
  <line x1="134" y1="180" x2="152" y2="168" stroke="#D4A843" stroke-width="1.2" opacity="0.2"/>
  <line x1="98" y1="168" x2="158" y2="168" stroke="#D4A843" stroke-width="0.8" opacity="0.12"/>

  <!-- H letter mark (subtle, centered below) -->
  <text x="128" y="228" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="700" letter-spacing="2" fill="#EDEDED" opacity="0.9">H</text>
</svg>